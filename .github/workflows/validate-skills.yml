name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Agent Skills Spec
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install skills-ref
        run: pip install "git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref"

      - name: Validate skill
        run: skills-ref validate ./dotnet-vertical-slice-best-practices

      - name: Check version tag matches SKILL.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SKILL_VERSION=$(grep -oP '(?<=version: ").*(?=")' dotnet-vertical-slice-best-practices/SKILL.md)
          if [ "$TAG_VERSION" != "$SKILL_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match SKILL.md version '$SKILL_VERSION'"
            exit 1
          fi
          echo "Version $SKILL_VERSION matches tag $GITHUB_REF_NAME"
